<!DOCTYPE html>
<html lang="en" data-ai-platform="citizen">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exploration Hub - Healther</title>
    <script>
        // This standalone page now redirects to the Citizen platform Explore function.
        (function(){
            try{
                // Prefer opening within the citizen platform so Explore is a function, not a separate page
                var target = '/citizen/citizen.html#explore';
                // If already inside citizen platform, just set hash
                if (window.location.pathname.endsWith('/citizen.html') || window.location.pathname.endsWith('citizen.html')) {
                    window.location.hash = '#explore';
                } else {
                    window.location.href = target;
                }
            }catch(e){ console.warn('Redirect to citizen explore failed', e); }
        })();
    </script>
    <script>try{var t=localStorage.getItem('theme'); if(t) document.documentElement.setAttribute('data-theme', t);}catch(e){};</script>
    <link rel="stylesheet" href="../global/style.css">
    <link rel="stylesheet" href="../global/nav.css">
    <link rel="stylesheet" href="explore.css">
    <link rel="icon" href="../assets/images/healther-icon.svg" type="image/svg+xml">
</head>
<body>

<header class="app-header">
    <div class="brand">
        <div class="brand-title">Healther</div>
        <div class="brand-subtitle">Exploration Hub</div>
    </div>
    <div class="header-search">
        <div class="search-container">
            <button id="search-btn" class="search-btn" aria-label="Search">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </button>
            <input type="text" id="search-input" class="search-input" placeholder="Search health news..." data-i18n-placeholder="search_placeholder">
            <button id="clear-search" class="clear-search" aria-label="Clear search" hidden>×</button>
        </div>
    </div>
    <div class="header-actions">
        <button id="more-options" aria-haspopup="true" aria-expanded="false" aria-label="Open options">⋮</button>
        <div id="options-tile" class="options-tile" hidden>
            <ul>
                <li><button class="opt-btn" data-action="profile">Profile</button></li>
                <li><button class="opt-btn" data-action="settings">Settings</button></li>
                <li><button class="opt-btn" data-action="help">Help</button></li>
                <li><button class="opt-btn" data-action="logout">Logout</button></li>
            </ul>
        </div>
        <div id="settings-tile" class="settings-tile" hidden>
            <ul>
                <li><button class="setting-btn" data-setting="ai-mods">Healther AI Modifications</button></li>
                <li><button class="setting-btn" data-setting="accounts">Accounts Centre</button></li>
                <li><button class="setting-btn" data-setting="language">Language</button></li>
                <li><button class="setting-btn" data-setting="theme">Theme</button></li>
                <li><button class="setting-btn" data-setting="tutorials">Tutorials</button></li>
            </ul>
    </div>
</header>

<aside class="sidebar" aria-label="Primary">
    <nav>
        <div class="nav-item" data-name="Home" data-key="home" title="Home">
            <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 11.5L12 4l9 7.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1V11.5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="label">Home</span>
        </div>
        <div id="theme-tile" class="theme-tile" hidden>
            <ul>
                <li><button class="theme-option" data-theme="dark">Dark theme</button></li>
                <li><button class="theme-option" data-theme="light">Light theme</button></li>
            </ul>
        </div>
        <div class="nav-item active" data-name="Explore Hub" data-key="explore" title="Explore Hub">
            <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="1.5"/>
                <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <span class="label">Explore Hub</span>
        </div>
        <div class="nav-item" data-name="Notifications" data-key="notifications" title="Notifications">
            <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0 1 18 14.158V11a6 6 0 1 0-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <span class="label">Notifications</span>
        </div>
        <div class="nav-item" data-name="My account" data-key="account" title="My account">
            <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="1.5"/>
            </svg>
            <span class="label">My account</span>
        </div>
    </nav>
</aside>

<main>
    <section class="explore-page" id="explore-page">
        <div class="explore-card">
            <h2 class="explore-heading">Exploration Hub</h2>
            
            <div class="explore-content">
                <div class="explore-section">
                    <h3>Global Health Trends & News</h3>
                    <p class="explore-subtitle">Curated health news from around the world</p>
                    
                    <!-- Filter Panel -->
                    <div class="filter-panel" id="filter-panel" hidden>
                        <div class="filter-header">
                            <h4 data-i18n="explore_filter">Filter News</h4>
                            <button id="close-filter" class="close-filter">×</button>
                        </div>
                        <div class="filter-group">
                            <label data-i18n="explore_category">Category</label>
                            <div id="category-filters" class="filter-options">
                                <label><input type="checkbox" value="covid" data-filter="category"> COVID-19</label>
                                <label><input type="checkbox" value="nutrition" data-filter="category"> Nutrition</label>
                                <label><input type="checkbox" value="fitness" data-filter="category"> Fitness</label>
                                <label><input type="checkbox" value="mental" data-filter="category"> Mental Health</label>
                                <label><input type="checkbox" value="technology" data-filter="category"> Health Tech</label>
                                <label><input type="checkbox" value="research" data-filter="category"> Research</label>
                            </div>
                        </div>
                        <div class="filter-group">
                            <label data-i18n="explore_type">Content Type</label>
                            <div id="type-filters" class="filter-options">
                                <label><input type="checkbox" value="article" data-filter="type" checked> Articles</label>
                                <label><input type="checkbox" value="video" data-filter="type"> Videos</label>
                                <label><input type="checkbox" value="image" data-filter="type"> Images</label>
                                <label><input type="checkbox" value="document" data-filter="type"> Documents</label>
                            </div>
                        </div>
                        <button class="apply-filters" id="apply-filters" data-i18n="explore_apply">Apply Filters</button>
                    </div>
                    
                    <!-- News Feed -->
                    <div class="news-feed" id="news-feed">
                        <div class="news-container" id="news-container">
                            <!-- News items will be loaded here -->
                            <div class="loading-spinner">
                                <div class="spinner"></div>
                                <p data-i18n="msg_loading">Loading health news...</p>
                            </div>
                        </div>
                        
                        <!-- Load More Button -->
                        <div class="load-more-container">
                            <button id="load-more-btn" class="load-more-btn" data-i18n="explore_load_more">Load More News</button>
                        </div>
                    </div>
                    
                    <!-- News Detail Modal -->
                    <div class="news-modal" id="news-modal" hidden>
                        <div class="modal-overlay" id="modal-overlay"></div>
                        <div class="modal-content" id="modal-content">
                            <button class="modal-close" id="modal-close">×</button>
                            <div class="modal-body" id="modal-body">
                                <!-- Full news details will be loaded here -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="explore-actions">
                <button type="button" class="btn" id="filter-toggle">Filter News</button>
                <button type="button" class="explore-back-btn" id="explore-back-btn">Back to Home</button>
            </div>
        </div>
    </section>
</main>

<script src="../global/logout-helper.js"></script>
<script src="../global/translations.js"></script>
<script src="../global/language-selector.js"></script>
<script src="explore.js"></script>
<script src="../global/navigation.js"></script>
<script src="../global/ai-assistant.js"></script>
</body>
</html>
