<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy - Healther Market</title>
    <script>try{var t=localStorage.getItem('theme'); if(t) document.documentElement.setAttribute('data-theme', t);}catch(e){};</script>
    <script>
        (function(){
            function setFaviconForTheme(theme){
                var ico = document.getElementById('favicon-ico');
                if(!ico){
                    ico = document.createElement('link');
                    ico.id = 'favicon-ico';
                    ico.rel = 'icon';
                    ico.type = 'image/x-icon';
                    document.head.appendChild(ico);
                }
                ico.href = (theme === 'dark') ? '../assets/healther.ico' : '../assets/health2.ico';
            }
            try{
                var current = document.documentElement.getAttribute('data-theme') || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                setFaviconForTheme(current);
            }catch(e){}
            new MutationObserver(function(mutations){
                mutations.forEach(function(m){
                    if(m.attributeName === 'data-theme'){
                        setFaviconForTheme(document.documentElement.getAttribute('data-theme'));
                    }
                });
            }).observe(document.documentElement,{attributes:true});
        })();
    </script>
    <link rel="stylesheet" href="../global/style.css">
    <link rel="stylesheet" href="../global/nav.css">
    <link rel="stylesheet" href="../global/ai-assistant.css">
    <link rel="stylesheet" href="citizen.css">
    <link rel="icon" href="../assets/images/healther-icon.svg" type="image/svg+xml">

</head>
<body>

            </button>
            <input type="text" id="search-input" class="search-input" placeholder="Search pharmacy products...">
            <button id="clear-search" class="clear-search" aria-label="Clear search" hidden>×</button>
        </div>
        <div id="search-results" class="search-results" hidden>

    <div class="header-actions">

            <ul>
                <li><button class="opt-btn" data-action="profile">Profile</button></li>
                <li><button class="opt-btn" data-action="settings">Settings</button></li>
                <li><button class="opt-btn" data-action="help">Help</button></li>
                <li><button class="opt-btn" data-action="logout">Logout</button></li>
            </ul>
        </div>
        <div id="settings-tile" class="settings-tile" hidden>
            <ul>
                <li><button class="setting-btn" data-setting="ai-mods">Healther AI Modifications</button></li>
                <li><button class="setting-btn" data-setting="accounts">Accounts Centre</button></li>
                <li><button class="setting-btn" data-setting="language">Language</button></li>
                <li><button class="setting-btn" data-setting="theme">Theme</button></li>
                <li><button class="setting-btn" data-setting="tutorials">Tutorials</button></li>

        </div>
    </div>
</header>

<aside class="sidebar" aria-label="Primary">

        <div class="nav-item" data-name="Notifications" data-key="notifications" title="Notifications">
            <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

<main class="main-content">
    <div class="category-header">
        <button onclick="history.back()" class="back-btn">← Back to Market</button>
        <h1>💊 Pharmacy</h1>
        <p>Medications, health supplies, and pharmaceutical products</p>
    </div>

    <div class="products-container">
        <div class="products-grid" id="pharmacy-products">
            <!-- Products will be loaded dynamically -->
        </div>
        
        <div class="loading-indicator" id="loading-indicator">
            <div class="spinner"></div>
            <p>Loading pharmacy products...</p>
        </div>
    </div>
</main>

<script src="../global/nav.js"></script>
<script src="citizen.js"></script>

<style>
    .main-content {
        padding: 20px;
        max-width: 1200px;
        margin: 0 auto;
    }

    .category-header {
        text-align: center;
        margin-bottom: 40px;
    }

    .category-header h1 {
        color: #28a745;
        font-size: 2.5rem;
        margin-bottom: 10px;
    }

    .category-header p {
        color: #666;
        font-size: 1.2rem;
        margin-bottom: 20px;
    }

    .back-btn {
        background: #6c757d;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 6px;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        margin-bottom: 20px;
    }

    .back-btn:hover {
        background: #5a6268;
    }

    .products-container {
        position: relative;
    }

    .products-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
    }

    .product-card {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        transition: transform 0.2s, box-shadow 0.2s;
        display: flex;
        flex-direction: column;
    }

    .product-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 15px rgba(0,0,0,0.2);
    }

    .product-image {
        width: 100%;
        height: 200px;
        object-fit: cover;
        background: #f8f9fa;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        color: #666;
    }

    .product-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .product-info {
        padding: 20px;
        flex: 1;
        display: flex;
        flex-direction: column;
    }

    .product-title {
        color: #333;
        font-size: 1.1rem;
        font-weight: 600;
        margin-bottom: 8px;
        line-height: 1.4;
    }

    .product-description {
        color: #666;
        font-size: 0.9rem;
        margin-bottom: 12px;
        flex: 1;
        line-height: 1.5;
    }

    .product-price {
        color: #28a745;
        font-size: 1.3rem;
        font-weight: bold;
        margin-bottom: 15px;
    }

    .product-rating {
        display: flex;
        align-items: center;
        gap: 5px;
        margin-bottom: 12px;
        color: #ffc107;
        font-size: 0.9rem;
    }

    .btn-primary {
        background: linear-gradient(135deg, #28a745 0%, #17a2b8 100%);
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.3s;
        font-weight: 500;
    }

    .btn-primary:hover {
        background: linear-gradient(135deg, #218838 0%, #138496 100%);
    }

    .loading-indicator {
        display: none;
        text-align: center;
        padding: 40px;
    }

    .loading-indicator.active {
        display: block;
    }

    .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #28a745;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    [data-theme="dark"] .product-card {
        background: #2d2d2d;
        color: #fff;
    }

    [data-theme="dark"] .product-title {
        color: #fff;
    }

    [data-theme="dark"] .product-description,
    [data-theme="dark"] .category-header p {
        color: #ccc;
    }

    [data-theme="dark"] .back-btn {
        background: #5a6268;
    }

    [data-theme="dark"] .back-btn:hover {
        background: #495057;
    }
</style>

<script>
    // Pharmacy products data
    const pharmacyProducts = [
        {
            id: 1,
            name: "Aspirin 500mg Tablets",

            price: "$4.99",

        },
        {
            id: 2,
            name: "Vitamin D3 5000 IU",
            description: "Supports bone health and immune system. 120 softgels. High potency formula for optimal absorption.",
            price: "$12.99",
            rating: 4.8,
            image: "https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=300&h=200&fit=crop",
            source: "HealthVit"
        },
        {
            id: 3,
            name: "Digital Thermometer",
            description: "Accurate temperature reading in 10 seconds. FDA approved. Clinical accuracy with fever alert.",
            price: "$15.99",
            rating: 4.3,
            image: "https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?w=300&h=200&fit=crop",
            source: "MedTech"
        },
        {
            id: 4,
            name: "Ibuprofen 200mg",
            description: "Pain reliever and anti-inflammatory. 200 tablets. Effective for menstrual cramps and joint pain.",
            price: "$7.99",
            rating: 4.6,
            image: "https://images.unsplash.com/photo-1587854692152-cbe660dbde88?w=300&h=200&fit=crop",
            source: "PainRelief Co"
        },
        {
            id: 5,
            name: "Antibacterial Hand Sanitizer",
            description: "70% alcohol formula. Kills 99.9% of germs. 500ml pump bottle with moisturizers.",
            price: "$3.99",
            rating: 4.2,
            image: "https://images.unsplash.com/photo-1584118627021-8b1b4c3b1b1b?w=300&h=200&fit=crop",
            source: "CleanHealth"
        },
        {
            id: 6,
            name: "Vitamin C 1000mg",
            description: "Immune system support. 180 tablets. Enhanced with rose hips and bioflavonoids.",
            price: "$9.99",
            rating: 4.7,
            image: "https://images.unsplash.com/photo-1608198093002-ad4e005b4c43?w=300&h=200&fit=crop",
            source: "ImmuneBoost"
        },
        {
            id: 7,
            name: "Blood Pressure Monitor",
            description: "Automatic upper arm monitor with large display. Memory for 2 users with 60 readings each.",
            price: "$49.99",
            rating: 4.7,
            image: "https://images.unsplash.com/photo-1559757148-5c350d0d3c56?w=300&h=200&fit=crop",
            source: "MedTech Pro"
        },
        {
            id: 8,
            name: "First Aid Kit",
            description: "Comprehensive emergency kit. 100+ pieces including bandages, antiseptic wipes, and medical tape.",
            price: "$24.99",
            rating: 4.5,
            image: "https://images.unsplash.com/photo-1551601651-2a8553c7ff38?w=300&h=200&fit=crop",
            source: "EmergencyKit"
        },
        {
            id: 9,
            name: "Allergy Medicine",
            description: "24-hour relief from allergy symptoms. 30 tablets. Non-drowsy formula for daytime use.",
            price: "$18.99",
            rating: 4.4,
            image: "https://images.unsplash.com/photo-1559757148-5c350d0d3c56?w=300&h=200&fit=crop",
            source: "AllergyRelief"
        },
        {
            id: 10,
            name: "Digestive Enzymes",
            description: "Supports healthy digestion. 90 capsules. Breaks down proteins, fats, and carbohydrates.",
            price: "$16.99",
            rating: 4.3,
            image: "https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?w=300&h=200&fit=crop",
            source: "DigestHealth"
        },
        {
            id: 11,
            name: "Sleep Aid Tablets",
            description: "Natural sleep support. 60 tablets. Non-habit forming with melatonin and valerian root.",
            price: "$13.99",
            rating: 4.1,
            image: "https://images.unsplash.com/photo-1584303291226-561c409f5c5c?w=300&h=200&fit=crop",
            source: "SleepWell"
        },
        {
            id: 12,
            name: "Multivitamin Complex",
            description: "Complete daily nutrition. 120 tablets. 25 essential vitamins and minerals.",
            price: "$19.99",
            rating: 4.6,
            image: "https://images.unsplash.com/photo-1608198093002-ad4e005b4c43?w=300&h=200&fit=crop",
            source: "DailyHealth"
        }
    ];

    // Render products
    function renderProducts(products, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;

        container.innerHTML = '';

        products.forEach(product => {
            const productCard = document.createElement('div');
            productCard.className = 'product-card';
            productCard.innerHTML = `
                <div class="product-image">
                    <img src="${product.image}" alt="${product.name}" onerror="this.style.display='none'; this.parentElement.innerHTML='💊';">
                </div>
                <div class="product-info">
                    <h3 class="product-title">${product.name}</h3>
                    <p class="product-description">${product.description}</p>
                    <div class="product-rating">
                        ${generateStars(product.rating)}
                        <span>${product.rating} (${Math.floor(Math.random() * 100) + 20} reviews)</span>
                    </div>
                    <p class="product-price">${product.price}</p>
                    <p style="font-size: 0.8rem; color: #666; margin-bottom: 10px;">Sold by ${product.source}</p>
                    <button class="btn-primary" onclick="viewProductDetails(${product.id})">View Details</button>
                </div>
            `;
            container.appendChild(productCard);
        });
    }

    // Generate star rating
    function generateStars(rating) {
        const fullStars = Math.floor(rating);
        const halfStar = rating % 1 >= 0.5 ? 1 : 0;
        const emptyStars = 5 - fullStars - halfStar;
        
        let stars = '';
        for (let i = 0; i < fullStars; i++) {
            stars += '⭐';
        }
        if (halfStar) {
            stars += '⭐';
        }
        for (let i = 0; i < emptyStars; i++) {
            stars += '☆';
        }
        return stars;
    }

    // View product details
    function viewProductDetails(productId) {
        const product = pharmacyProducts.find(p => p.id === productId);
        if (product) {
            alert(`Product Details:\n\nName: ${product.name}\nDescription: ${product.description}\nPrice: ${product.price}\nRating: ${product.rating}⭐\nSource: ${product.source}\n\nThis would open a detailed product view in a real application.`);
        }
    }

    // Initialize page
    document.addEventListener('DOMContentLoaded', () => {
        console.log('Pharmacy page loaded');
        
        const loadingIndicator = document.getElementById('loading-indicator');
        loadingIndicator.classList.add('active');

        // Simulate loading delay
        setTimeout(() => {
            renderProducts(pharmacyProducts, 'pharmacy-products');
            loadingIndicator.classList.remove('active');
        }, 1000);

        // Handle navigation clicks
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', function() {
                const key = this.getAttribute('data-key');
                if (key === 'home') {
                    window.location.href = 'citizen.html';
                } else if (key === 'explore') {
                    window.location.href = 'explore.html';
                } else if (key === 'market') {
                    window.location.href = 'market.html';
                } else if (key === 'notifications') {
                    console.log('Notifications clicked');
                } else if (key === 'account') {
                    window.location.href = 'account-settings.html';
                }
            });
        });

        // Initialize Healther AI Assistant
        window.HealtherAI.init({
            theme: document.documentElement.getAttribute('data-theme') || 'light',
            autoOpen: false
        });
    });
</script>
</body>
</html>
