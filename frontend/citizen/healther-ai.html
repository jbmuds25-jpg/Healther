<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Healther AI</title>

<style>

body{
font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
background:#f4f7fb;
margin:0;
display:flex;
flex-direction:column;
height:100vh;
}

.header{
background:#0a66ff;
color:white;
padding:15px 20px;
font-size:20px;
font-weight:bold;
display:flex;
align-items:center;
gap:10px;
}

.header::before{
content:"🤖";
font-size:24px;
}

.chat-container{
flex:1;
overflow-y:auto;
padding:20px;
background:white;
margin:10px;
border-radius:12px;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
}

.message{
padding:12px 16px;
margin:12px 0;
border-radius:12px;
max-width:80%;
animation:fadeIn 0.3s ease-in;
}

@keyframes fadeIn {
from { opacity: 0; transform: translateY(10px); }
to { opacity: 1; transform: translateY(0); }
}

.user{
background:#0a66ff;
color:white;
margin-left:auto;
border-bottom-right-radius:18px;
}

.ai{
background:#f1f3f4;
color:#333;
margin-right:auto;
border-bottom-left-radius:18px;
}

.input-area{
display:flex;
padding:20px;
background:white;
border-top:1px solid #e0e0e0;
gap:10px;
}

input{
flex:1;
padding:12px 16px;
font-size:16px;
border:2px solid #e0e0e0;
border-radius:8px;
outline:none;
transition:border-color 0.3s ease;
}

input:focus{
border-color:#0a66ff;
box-shadow:0 0 0 3px rgba(10,102,255,0.1);
}

button{
padding:12px 24px;
background:#0a66ff;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
transition:all 0.2s ease;
}

button:hover{
background:#0052cc;
transform:translateY(-1px);
}

button:active{
transform:translateY(0);
}

/* Loading state */
.message.loading {
    background: #f0f0f0;
    color: #666;
    border-left: 3px solid #0a66ff;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

/* Responsive design */
@media (max-width: 768px) {
    .header {
        padding: 12px 16px;
        font-size: 18px;
    }
    
    .chat-container {
        margin: 8px;
        padding: 16px;
    }
    
    .message {
        max-width: 90%;
        padding: 10px 12px;
    }
    
    .input-area {
        padding: 16px;
        flex-direction: column;
        gap: 8px;
    }
    
    input {
        padding: 10px 12px;
    }
    
    button {
        width: 100%;
        padding: 12px 20px;
    }
}

</style>

</head>

<body>

<div class="header">🤖 Healther AI</div>

<div id="chat" class="chat-container"></div>

<div class="input-area">
<input id="messageInput" placeholder="Ask Healther AI anything..." onkeypress="handleKeyPress(event)">
<button onclick="sendMessage()">Send</button>
</div>

<script>
function handleKeyPress(event) {
    if (event.key === 'Enter') {
        sendMessage();
    }
}
</script>
<script src="healther-ai.js"></script>

</body>
</html>
