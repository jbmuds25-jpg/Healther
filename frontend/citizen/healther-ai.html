<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healther AI</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f9ff;
        }
        
        .header {
            background: #0a66ff;
            color: white;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .ai-container {
            width: 100%;
            height: calc(100vh - 60px);
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        /* Dark theme support */
        [data-theme="dark"] body {
            background: #1a1a2e;
        }
        
        [data-theme="dark"] .header {
            background: #1e3a8a;
        }
        
        /* Responsive design */
        @media (max-width: 768px) {
            .header {
                font-size: 16px;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        🤖 Healther AI Assistant
    </div>
    
    <div class="ai-container">
        <iframe src="https://healtherai.base44.app" title="Healther AI Assistant"></iframe>
    </div>
</body>
</html>
